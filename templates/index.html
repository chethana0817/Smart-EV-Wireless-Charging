<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Software Controlled Wireless Power Transmission</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: url('/static/bg.avif') no-repeat center center fixed;
      background-size: cover;
      color: #222;
      min-height: 100vh;
    }
    .card {
      border-radius: 1rem;
      background-color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }
    #voltageChart {
      max-height: 150px;
    }
    .log-box {
      height: 200px;
      overflow-y: auto;
      background-color: rgba(255, 255, 255, 0.6);
      border-radius: 0.5rem;
      padding: 1rem;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.05);
    }
    h2, h5 {
      color: #343a40;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <h2 class="mb-4 text-center" style="font-weight: bolder; font-size: 3rem;">
      Software Controlled Wireless Power Transmission
    </h2>

    <div class="row g-4" style="top:25px;">
      <!-- Battery Voltage -->
      <div class="col-md-6">
        <div class="card p-4 text-center">
          <h5>Battery Voltage</h5>
          <canvas id="voltageChart"></canvas>
          <h2 id="voltageValue" class="mt-3 text-primary">0.00 V</h2>
          <h5 id="batteryPercent" class="text-success">0%</h5>
        </div>
      </div>

      <!-- Status Info -->
      <div class="col-md-6">
        <div class="card p-4">
          <h5>Status</h5>
          <p><strong>Charging:</strong> <span id="relayStatus" class="badge bg-secondary">Loading...</span></p>
          <p><strong>Car Count:</strong> <span id="carCount">0</span></p>
        </div>
      </div>

      <!-- Event Log -->
      <div class="col-12">
        <div class="card p-4">
          <h5>Event Log</h5>
          <div class="log-box" id="logBox"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const voltageCtx = document.getElementById("voltageChart").getContext("2d");
    let gaugeChart = new Chart(voltageCtx, {
      type: "doughnut",
      data: {
        labels: ["Voltage"],
        datasets: [
          {
            data: [0, 5],
            backgroundColor: ["#0d6efd", "#dee2e6"],
            borderWidth: 0,
          },
        ],
      },
      options: {
        rotation: -90,
        circumference: 180,
        cutout: "80%",
        plugins: {
          legend: { display: false },
          tooltip: { enabled: false },
        },
      },
    });

    function updateDashboard() {
      fetch("/data")
        .then((res) => res.json())
        .then((data) => {
          const voltage = data.battery_voltage;
          const percent = data.battery_percent;

          document.getElementById("voltageValue").textContent = `${voltage.toFixed(2)} V`;
          document.getElementById("batteryPercent").textContent = `${percent}%`;

          gaugeChart.data.datasets[0].data[0] = voltage;
          gaugeChart.data.datasets[0].data[1] = 5 - voltage;
          gaugeChart.update();

          document.getElementById("relayStatus").textContent = data.relay_status;
          document.getElementById("relayStatus").className =
            data.relay_status === "CHARGING"
              ? "badge bg-success"
              : "badge bg-danger";

          document.getElementById("carCount").textContent = data.car_count;

          const logBox = document.getElementById("logBox");
          logBox.innerHTML = "";
          data.log.reverse().forEach((entry) => {
            const logItem = document.createElement("div");
            logItem.innerHTML = `<small><strong>${entry.time}</strong> - ${entry.event}</small>`;
            logBox.appendChild(logItem);
          });
        });
    }

    setInterval(updateDashboard, 2000);
    updateDashboard();
  </script>
</body>
</html>
